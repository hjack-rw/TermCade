<!doctype html>
<meta charset="utf-8" />
<title>TermCade &mdash; beta</title>
<style>
  $theme

  input {
    background: var(--panel);
    color: var(--amber);
    border: 1px solid var(--amber);
    font-family: inherit;
    font-size: 1.2rem;
    padding: 0.5rem;
    text-align: center;
  }

  button {
    background: var(--amber);
    color: var(--bg);
    border: 0;
    font-family: inherit;
    font-size: 1.2rem;
    padding: 0.55rem 1.2rem;
    margin-left: 0.5rem;
    cursor: pointer;
  }
</style>

<!-- `action="/"` is quoted on purpose. Unquoted, `action=/` is one character from parsing as a
     self-closing `<form/>`: browsers take the `/` as the value and the door works, but a parser is
     entitled to read it the other way, and one that did would drop the passcode field out of the
     form entirely. -->
<form method="get" action="/">
  <h1>TermCade</h1>
  <p>$message</p>
  <input
    name="code"
    autofocus
    autocapitalize="off"
    autocomplete="off"
    spellcheck="false"
    placeholder="passcode"
  />
  <button type="submit">Enter</button>
</form>
